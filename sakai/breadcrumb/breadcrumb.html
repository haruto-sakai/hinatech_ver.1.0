<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>common_parts</title>
    <link rel="stylesheet" href="breadcrumb.css">
</head>
<body>
    <main class="main-breadcrumb">
        <ol class="breadcrumb" itemtype="https://schema.org/BreadcrumbList">
            <!-- 1つめ -->
            <li itemprop="itemListElement" itemscope
                itemtype="https://schema.org/ListItem">
              <a itemprop="item" href="ホームのURL">
                  <span itemprop="name">ホーム</span>
              </a>
              <meta itemprop="position" content="1" />
            </li>
          
            <!-- 2つめ -->
            <li itemprop="itemListElement" itemscope
                itemtype="https://schema.org/ListItem">
              <a itemprop="item" href="カテゴリーのURL">
                  <span itemprop="name">カテゴリー名</span>
              </a>
              <meta itemprop="position" content="2" />
            </li>
          
            <!-- 3つめ -->
            <li itemprop="itemListElement" itemscope
                itemtype="https://schema.org/ListItem">
              <a itemprop="item" href="子カテゴリーのURL">
                  <span itemprop="name">子カテゴリー名</span>
              </a>
              <meta itemprop="position" content="3" />
            </li>
          </ol>
    <main>
</body>
</html>
